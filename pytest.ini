[pytest]
# Collect only this checkout's tests. Running pytest from a directory that
# happens to contain a second copy of the repository collects both, and the
# two copies then fight over the transferintel import.
testpaths = scripts/tests

# Generated output contains no tests and is expensive to walk. `transfer-intel`
# is listed because extracting a release archive inside an existing checkout is
# the usual way a nested duplicate appears.
norecursedirs =
    .git
    .venv
    venv
    __pycache__
    build
    og
    deals
    clubs
    thanks
    node_modules
    transfer-intel

addopts = -q

# Deprecation warnings are the only advance notice a Python upgrade gives you.
# A year-less strptime call sat in migrate_data.py emitting one on every run
# under 3.14, and it was not merely cosmetic: the implicit year 1900 is not a
# leap year, so "Feb 29" failed to parse and silently fell back. Treat them as
# errors so the next one is found by the suite rather than by a user.
filterwarnings =
    error::DeprecationWarning
    error::PendingDeprecationWarning
    # Third-party noise we do not control. Add narrowly, never blanket-ignore.
    ignore::DeprecationWarning:pydantic.*
    ignore::DeprecationWarning:httpx.*
