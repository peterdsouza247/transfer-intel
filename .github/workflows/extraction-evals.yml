name: Extraction evals

# The only suite that costs money. Run it when you touch the extraction
# prompt in extract.py, not on a schedule.
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/transferintel/extract.py"
      - "evals/extraction/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r scripts/requirements.txt
      - name: Run
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/run_evals.py --suite extraction
      - name: Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: evals/report.md
