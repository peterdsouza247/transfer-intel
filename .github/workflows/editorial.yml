name: Editorial refresh

on:
  schedule:
    - cron: "0 7 * * *"   # daily, 07:00 UTC, after the morning news cycle
  workflow_dispatch:
    inputs:
      no_notes:
        description: "Skip phase 4 (no model calls)"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: editorial
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r scripts/requirements.txt

      # Guard the rules before they touch live data. The golden set costs
      # nothing to run because it replays recorded model output, so there is
      # no reason not to run it on every single execution.
      - name: Test
        run: python -m pytest scripts/tests -q

      - name: Golden set
        run: python scripts/run_evals.py --suite pipeline

      # Phases 1 and 2. Fails soft: if the feeds are down or extraction
      # breaks, an empty evidence file turns the run into a pure decay pass,
      # which is still a correct thing to publish.
      - name: Ingest and extract
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TI_EXTRACT_MODEL: claude-haiku-4-5-20251001
        run: |
          mkdir -p build
          python scripts/run_ingest.py \
            --data data.json \
            --out build \
            --window-hours 36 \
            --max-batches 12

      - name: Guarantee an evidence file
        run: '[ -f build/evidence.json ] || echo "{}" > build/evidence.json' 

      - name: Score and write notes
        id: editorial
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TI_NOTE_MODEL: claude-sonnet-5
        run: |
          python scripts/run_editorial.py \
            --data data.json \
            --evidence build/evidence.json \
            --out build \
            --max-notes 12 \
            --max-changes 15 \
            ${{ inputs.no_notes && '--no-notes' || '' }} \
            --apply

      # Rendering is a build step, not an editorial decision, so it runs
      # after the gate has already approved the content. It regenerates the
      # pre-rendered index, every deal and club page, the sitemap, the feed
      # and the Open Graph cards from the same data.json the gate just
      # checked, which is why they can never disagree with it.
      - name: Render the site
        run: python scripts/render_site.py --data data.json --template index.html --out .

      # Candidates are deals we do not track. They ride along in the PR body
      # so you can accept one in the same review, but they never touch
      # data.json on their own.
      - name: Assemble the PR body
        run: |
          cat build/patch.md > build/pr.md
          if [ -f build/candidates.md ]; then
            printf "\n\n---\n\n" >> build/pr.md
            cat build/candidates.md >> build/pr.md
          fi

      - name: Archive the run
        run: |
          mkdir -p logs
          cp build/patch.json "logs/$(date -u +%F).json"
          cp build/ingest_stats.json "logs/$(date -u +%F)-ingest.json" || true

      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/editorial
          base: main
          title: "Editorial refresh: ${{ github.run_id }}"
          body-path: build/pr.md
          labels: auto/editorial
          commit-message: "chore: daily editorial refresh"
          add-paths: |
            data.json
            data.js
            logs/
          delete-branch: true
